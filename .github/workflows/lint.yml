name: Lint

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'api/**'
      - 'cmd/**'
      - 'config/**'
      - 'internal/**'
      - 'slurm-agent/**'
      - 'test/**'
      - '.custom-gcl.yml'
      - '.dockerignore'
      - 'Dockerfile'
      - 'Makefile'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'api/**'
      - 'cmd/**'
      - 'config/**'
      - 'internal/**'
      - 'slurm-agent/**'
      - 'test/**'
      - '.custom-gcl.yml'
      - '.dockerignore'
      - 'Dockerfile'
      - 'Makefile'
      - 'go.mod'
      - 'go.sum'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check linter configuration
        run: make lint-config
      - name: Run linter
        run: make lint
