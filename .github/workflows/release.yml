name: Release Operator

on:
  push:
    branches:
    - main
    tags:
    - v*
    paths:
    - '.github/workflows/**'
    - 'api/**'
    - 'cmd/**'
    - 'config/**'
    - 'internal/**'
    - 'slurm-agent/**'
    - 'test/**'
    - '.custom-gcl.yml'
    - '.dockerignore'
    - 'Dockerfile'
    - 'Makefile'
    - 'go.mod'
    - 'go.sum'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Compute image metadata
      id: vars
      shell: bash
      run: |
        echo "image=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
        echo "ssh_image=${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}/hybrid-workflows-ssh-client" >> "$GITHUB_OUTPUT"
        echo "sha_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
        if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
          echo "primary_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
        else
          echo "primary_tag=main" >> "$GITHUB_OUTPUT"
        fi

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Generate Docker tags
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ steps.vars.outputs.image }}
        tags: |
          type=raw,value=${{ steps.vars.outputs.primary_tag }}
          type=raw,value=${{ steps.vars.outputs.sha_tag }}

    - name: Build and push controller image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Build and push SSH client image
      uses: docker/build-push-action@v6
      with:
        context: ./slurm-agent
        file: ./slurm-agent/Dockerfile.ssh-client
        push: true
        tags: |
          ${{ steps.vars.outputs.ssh_image }}:${{ steps.vars.outputs.primary_tag }}
          ${{ steps.vars.outputs.ssh_image }}:${{ steps.vars.outputs.sha_tag }}

    - name: Generate installer manifest
      run: make build-installer IMG=${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.sha_tag }} SSH_CLIENT_IMG=${{ steps.vars.outputs.ssh_image }}:${{ steps.vars.outputs.sha_tag }}

    - name: Upload installer artifact
      uses: actions/upload-artifact@v6
      with:
        name: hybrid-workflows-operator-install
        path: dist/install.yaml

    - name: Publish GitHub release assets
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/install.yaml

    - name: Promote operator manifests in GitOps repo
      if: github.ref == 'refs/heads/main'
      env:
        GITOPS_REPO_TOKEN: ${{ secrets.GITOPS_REPO_TOKEN }}
        GITOPS_REPO: ${{ vars.GITOPS_REPO }}
        GITOPS_REPO_BRANCH: ${{ vars.GITOPS_REPO_BRANCH }}
        GITOPS_OPERATOR_OVERLAY_FILE: ${{ vars.GITOPS_OPERATOR_OVERLAY_FILE }}
      shell: bash
      run: |
        if [[ -z "${GITOPS_REPO_TOKEN}" ]]; then
          echo "GITOPS_REPO_TOKEN is not configured; skipping GitOps promotion."
          exit 0
        fi

        gitops_repo="${GITOPS_REPO:-${GITHUB_REPOSITORY_OWNER}/hybrid-workflows-gitops}"
        gitops_repo_branch="${GITOPS_REPO_BRANCH:-main}"

        echo "Promoting operator manifests to ${gitops_repo}@${gitops_repo_branch}"

        git clone "https://x-access-token:${GITOPS_REPO_TOKEN}@github.com/${gitops_repo}.git" /tmp/hybrid-workflows-gitops
        cd /tmp/hybrid-workflows-gitops

        overlay_file="${GITOPS_OPERATOR_OVERLAY_FILE:-apps/hybrid-workflows-operator/overlays/minikube/kustomization.yaml}"
        installer_file="apps/hybrid-workflows-operator/base/install.yaml"
        image_ref="${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.sha_tag }}"

        if [[ ! -f "${overlay_file}" ]]; then
          echo "Overlay file ${overlay_file} does not exist in ${gitops_repo}."
          echo "Set the GITOPS_OPERATOR_OVERLAY_FILE repo variable to a valid path."
          exit 1
        fi

        if [[ ! -f "${installer_file}" ]]; then
          echo "Installer file ${installer_file} does not exist in ${gitops_repo}."
          exit 1
        fi

        cp "${GITHUB_WORKSPACE}/dist/install.yaml" "${installer_file}"
        sed -i "s#^\([[:space:]]*newTag:[[:space:]]*\).*#\1${{ steps.vars.outputs.sha_tag }}#" "${overlay_file}"

        if git diff --quiet -- "${overlay_file}" "${installer_file}"; then
          echo "GitOps repo already points at ${image_ref} with the latest installer manifest; nothing to do."
          exit 0
        fi

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add "${overlay_file}" "${installer_file}"
        git commit -m "chore(operator): promote hybrid-workflows-operator to ${{ steps.vars.outputs.sha_tag }}"
        git push origin HEAD:"${gitops_repo_branch}"
