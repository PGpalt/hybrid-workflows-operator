name: E2E Tests

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'api/**'
      - 'cmd/**'
      - 'config/**'
      - 'internal/**'
      - 'slurm-agent/**'
      - 'test/**'
      - '.custom-gcl.yml'
      - '.dockerignore'
      - 'Dockerfile'
      - 'Makefile'
      - 'go.mod'
      - 'go.sum'
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    env:
      KIND_NODE_IMAGE: ghcr.io/pgpalt/kindest-node:v1.35.0@sha256:b7f5e1f621afb1156eb0f27f26c804e5265c07d8e9c55516d25d66400043629b
    steps:
      - name: Clone the code
        uses: actions/checkout@v5

      - name: Detect operator-relevant changes
        id: changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            relevant:
              - '.github/workflows/**'
              - 'api/**'
              - 'cmd/**'
              - 'config/**'
              - 'internal/**'
              - 'slurm-agent/**'
              - 'test/**'
              - '.custom-gcl.yml'
              - '.dockerignore'
              - 'Dockerfile'
              - 'Makefile'
              - 'go.mod'
              - 'go.sum'

      - name: Skip non-operator-only PR changes
        if: github.event_name == 'pull_request' && steps.changes.outputs.relevant != 'true'
        run: echo "No operator-relevant changes detected; skipping E2E Tests."

      - name: Setup Go
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install the latest version of kind
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true'
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.31.0/kind-linux-$(go env GOARCH)
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true'
        run: kind version

      - name: Running Test e2e
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true'
        run: |
          go mod tidy
          make test-e2e
