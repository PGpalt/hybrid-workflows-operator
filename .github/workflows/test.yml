name: Tests

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'api/**'
      - 'cmd/**'
      - 'config/**'
      - 'internal/**'
      - 'slurm-agent/**'
      - 'test/**'
      - '.custom-gcl.yml'
      - '.dockerignore'
      - 'Dockerfile'
      - 'Makefile'
      - 'go.mod'
      - 'go.sum'
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v5

      - name: Detect operator-relevant changes
        id: changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            relevant:
              - '.github/workflows/**'
              - 'api/**'
              - 'cmd/**'
              - 'config/**'
              - 'internal/**'
              - 'slurm-agent/**'
              - 'test/**'
              - '.custom-gcl.yml'
              - '.dockerignore'
              - 'Dockerfile'
              - 'Makefile'
              - 'go.mod'
              - 'go.sum'

      - name: Skip non-operator-only PR changes
        if: github.event_name == 'pull_request' && steps.changes.outputs.relevant != 'true'
        run: echo "No operator-relevant changes detected; skipping Tests."

      - name: Setup Go
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Running Tests
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true'
        run: |
          go mod tidy
          make test

      - name: Build SSH client image
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true'
        run: docker build -f slurm-agent/Dockerfile.ssh-client -t example.com/hybrid-workflows-ssh-client:test slurm-agent

      - name: Build installer bundle
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true'
        run: make build-installer IMG=example.com/hybrid-workflows-operator:test SSH_CLIENT_IMG=example.com/hybrid-workflows-ssh-client:test

      - name: Validate bundled slurm template
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true'
        run: |
          grep -q '^kind: ClusterWorkflowTemplate$' dist/install.yaml
          grep -q '^  name: slurm-template$' dist/install.yaml
          grep -q 'example.com/hybrid-workflows-ssh-client:test' dist/install.yaml
