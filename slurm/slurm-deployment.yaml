apiVersion: apps/v1
kind: Deployment
metadata:
  name: slurm-container
  namespace: argo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slurm-container
  template:
    metadata:
      labels:
        app: slurm-container
    spec:
      hostname: slurmctl
      initContainers:
        - name: install-authorized-key
          image: ghcr.io/pgpalt/slurm-container:main
          command:
            - /bin/sh
            - -c
            - |
              umask 077
              mkdir -p /root/.ssh
              cp /tmp/authorized-key/authorized_keys /root/.ssh/authorized_keys
              chmod 700 /root/.ssh
              chmod 600 /root/.ssh/authorized_keys
              chown 0:0 /root/.ssh /root/.ssh/authorized_keys
          volumeMounts:
            - name: ssh-home
              mountPath: /root/.ssh
            - name: ssh-authorized-key-src
              mountPath: /tmp/authorized-key
              readOnly: true
      containers:
        - name: slurm
          image: ghcr.io/pgpalt/slurm-container:main
          stdin: true
          tty: true
          ports:
            - containerPort: 2220
              name: ssh
          securityContext:
            capabilities:
              add:
                - SYS_ADMIN
          volumeMounts:
            - name: ssh-home
              mountPath: /root/.ssh
          resources:
            requests:
              cpu: "1"
              memory: "1Gi"
            limits:
              cpu:  "1"
              memory: "1536Mi"
      volumes:
        - name: ssh-home
          emptyDir: {}
        - name: ssh-authorized-key-src
          secret:
            secretName: slurm-authorized-key
            defaultMode: 0600
            items:
              - key: authorized_keys
                path: authorized_keys
